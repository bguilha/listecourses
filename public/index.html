<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Listes de Courses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Mes Listes de Courses</h1>
            <button id="library-btn" class="header-btn" title="Bibliothèque d'articles">
                <span>Suggestions</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </button>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="Alimentaire">Supermarché</button>
            <button class="tab-btn" data-tab="Bricolage">Bricolage</button>
            <button class="tab-btn" data-tab="Marché">Biocoop</button>
            <button class="tab-btn" data-tab="Divers">Divers</button>
        </nav>

        <main>
            <div class="input-group">
                <input type="text" id="new-item-input" placeholder="Ajouter un article...">
                <button id="add-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>

            <ul id="shopping-list" class="shopping-list">
                <!-- Items will be injected here -->
            </ul>

            <div id="empty-state" class="empty-state hidden">
                <p>Aucun article dans cette liste.</p>
            </div>
        </main>

        <!-- Library Modal -->
        <div id="library-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Bibliothèque d'articles</h2>
                    <button id="close-library-btn" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <p class="library-hint">Cliquez sur un article pour l'ajouter à votre liste Supermarché.</p>
                    <div class="input-group">
                        <input type="text" id="new-library-item-input" placeholder="Ajouter à la bibliothèque...">
                        <button id="add-library-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                    <ul id="library-list" class="shopping-list">
                        <!-- Items will be injected here -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
